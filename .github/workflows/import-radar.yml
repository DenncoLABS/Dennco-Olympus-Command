name: Import RADAR Source

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/import-radar.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-radar:
    name: Import Syntax-Error-1337/radar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone source repository
        run: |
          rm -rf /tmp/radar-source
          git clone --depth 1 https://github.com/Syntax-Error-1337/radar.git /tmp/radar-source
          rm -rf /tmp/radar-source/.git

      - name: Import files
        run: |
          IMPORT_WORKFLOW="$(mktemp)"
          mkdir -p .github/workflows
          cp .github/workflows/import-radar.yml "$IMPORT_WORKFLOW"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows/***' \
            /tmp/radar-source/ ./

          mkdir -p .github/workflows
          cp "$IMPORT_WORKFLOW" .github/workflows/import-radar.yml

      - name: Show pending changes
        run: |
          git status --short

      - name: Commit imported source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Import RADAR source into Olympus Command"
          git push
