name: Publish Apt Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - "server/**"
      - "package.json"
      - "package-lock.json"
      - "packaging/**"
      - "install.sh"
      - ".github/workflows/publish-apt.yml"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build .deb and publish apt repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rsync

      - name: Build Debian package
        run: |
          chmod +x packaging/build-deb.sh
          VERSION="$(node -p "require('./package.json').version")-${GITHUB_RUN_NUMBER}" ./packaging/build-deb.sh

      - name: Prepare apt repository
        run: |
          set -euo pipefail
          mkdir -p aptrepo/pool/main/d/dennco-olympus-command
          cp dist/deb/*.deb aptrepo/pool/main/d/dennco-olympus-command/
          mkdir -p aptrepo/dists/stable/main/binary-amd64
          cd aptrepo
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          cat > dists/stable/Release <<'EOF'
          Origin: DenncoLABS
          Label: Dennco Olympus Command
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Dennco Olympus Command apt repository
          EOF
          echo "APT repository contents:"
          find . -maxdepth 5 -type f -print | sort

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/olympus-apt-pages
          mkdir -p /tmp/olympus-apt-pages
          cd /tmp/olympus-apt-pages

          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          rm -rf ./* ./.nojekyll || true
          rsync -a "$GITHUB_WORKSPACE/aptrepo/" ./
          touch .nojekyll
          cat > index.html <<'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>Dennco Olympus Command Apt Repository</title></head>
            <body>
              <h1>Dennco Olympus Command Apt Repository</h1>
              <p>Use the installer from the main branch:</p>
              <pre>curl -fsSL https://raw.githubusercontent.com/DenncoLABS/Dennco-Olympus-Command/main/install.sh | bash</pre>
            </body>
          </html>
          EOF

          git add -A
          git status --short
          git commit -m "Publish apt repository" || echo "No gh-pages changes to commit."
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
