name: olympus-core

services:
  postgres:
    image: timescale/timescaledb-ha:pg16.6-ts2.17-all
    container_name: olympus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OLYMPUS_POSTGRES_DB:-olympus}
      POSTGRES_USER: ${OLYMPUS_POSTGRES_USER:-olympus}
      POSTGRES_PASSWORD: ${OLYMPUS_POSTGRES_PASSWORD:?set OLYMPUS_POSTGRES_PASSWORD in ops/core/.env.core}
    ports:
      - "${OLYMPUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - olympus-postgres-data:/home/postgres/pgdata/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.2-alpine
    container_name: olympus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${OLYMPUS_REDIS_PORT:-6379}:6379"
    volumes:
      - olympus-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: olympus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OLYMPUS_MINIO_ROOT_USER:-olympusadmin}
      MINIO_ROOT_PASSWORD: ${OLYMPUS_MINIO_ROOT_PASSWORD:?set OLYMPUS_MINIO_ROOT_PASSWORD in ops/core/.env.core}
    ports:
      - "${OLYMPUS_MINIO_API_PORT:-9000}:9000"
      - "${OLYMPUS_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - olympus-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 10s
      retries: 10

volumes:
  olympus-postgres-data:
  olympus-redis-data:
  olympus-minio-data:
